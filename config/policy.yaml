signals:
  freshness_days_quiver: 7
  freshness_days_insider: 10                   # insider trades: 10d captures buy clusters (Form 4 lag + multi-day patterns)
  freshness_days_sec13f: 6                     # SEC 13F: filings arrive in 1-2 days → 6d still fresh, 7d conservative
  freshness_days_congress: 15                  # Congress/Senate/House: alpha concentrado en días 1-10 (STOCK Act permite 45d pero el move ya ocurrió)
  freshness_days_yahoo_prices: 2
  freshness_days_gov_contracts: 45             # small contracts (<$50M): 45d, likely discounted beyond that
  freshness_days_gov_contracts_large: 90       # large contracts (>=$50M): 90d, multi-year execution not yet priced
  gov_contract_large_threshold_usd: 50000000  # $50M threshold to qualify as large
  max_symbols_per_scan: 30           # symbols evaluated per scan cycle
                                     # Yahoo fetches are sequential (~2-5s/symbol):
                                     # 30 symbols ≈ 1.5-2.5 min scan + 15s sleep ≈ 2 min/cycle
                                     # 4900 symbols / 30 per cycle = 163 cycles × ~2 min = ~5.5h
                                     # → covers full universe 1.2-1.5x per trading day (6.5h session)
                                     # fresh signals (insider filings, gov contracts) caught same day
  symbol_rescan_cooldown_hours: 4    # hours before a symbol can be re-evaluated (0 = no cooldown)
                                     # 4h → ~2-3 full sweeps/day; catches afternoon filings & contracts
  approval_threshold: 9.8     # min total score to approve
                              # 9.8 → high-conviction only; buffer keeps LMT (10.19) safe on weak-momentum days
                              # test 2026-03-07 (threshold 10): 4/14 approved — RTX 17.4, WRB 14.9, THRY 13.9, LMT 10.2
                              # in bull market expect 3-6/day; in correction (Mar-2026) 2-4/day
  min_quiver_score: 3.0       # secondary gate: requires meaningful Quiver signal (not just Yahoo bonus)
                              # 3.0 = ~1 insider buy ($2.0) + small gov contract, OR $1.5M gov contracts alone
                              # prevents pure-Yahoo approvals (CAKE 0.0, NRP 0.0, HOFT 0.0) if threshold ever lowered

market:
  global_kill_switch: false
  # Pause new entries when CBOE VIX exceeds this level.
  # 0 = disabled.  Levels: calm <20, elevated 20-28, fear >28, crisis >35.
  # Existing positions continue to be monitored regardless.
  # Lowered to 22 (from 28): pause entries in elevated-VIX environments
  # (Mar-2026 correction shows entries at VIX 22-27 consistently lose money).
  vix_pause_threshold: 22

yahoo_gate:
  min_avg_volume_7d: 250000
  min_market_cap: 1000000000
  max_atr_pct: 6.0
  require_trend_positive: true   # long-only: only buy stocks in uptrend vs 90d start
  min_price: 5.0
  max_price: 1000.0
  relaxed_min_market_cap: 300000000
  relaxed_min_avg_volume_7d: 50000
  relaxed_max_atr_pct: 12.0

technicals:
  # RSI gate applied after yahoo data fetch (uses already-fetched 90d history, no extra API call)
  # long-only sweet spot: avoid deeply oversold downtrends and overbought tops
  rsi_period: 14
  min_rsi: 40     # below 40 = likely in downtrend, avoid
  max_rsi: 75     # above 75 = overbought, high reversal risk
  require_rsi: false   # if true, reject symbols where RSI cannot be computed

quiver_gate:
  enabled: true
  fast_lane_enabled: true
  # Fast lane: strong single signal bypasses yahoo strict thresholds (but not trend or RSI)
  fast_lane_require_trend_positive: true    # even in fast_lane, require uptrend vs 90d start (prevents NGNE-type entries)
  fast_lane_confirm_sec: 300               # signal must appear in 2 consecutive scans within this window (prevents phantom API entries)
  insider_buy_strong_min_count_7d: 3        # >= 3 insider buys in 7d = strong (clusters reales, evidencia ScienceDirect 2024)
  gov_contract_strong_min_total_30d: 5000000  # >= $5M gov contracts in 30d = strong (raised from $1M to filter noise)
  patent_momentum_min_strong: 1.0           # >= 1.0 patent momentum score = strong (scale 0-5)
  # Minimum gate: at least ONE of these must be met for a symbol to pass
  # Set all to 0 to disable the gate entirely (quiver becomes scoring-only)
  insider_buy_min_count_lookback: 3         # al menos 3 insider buys (clusters, no señales individuales ruidosas)
  gov_contract_min_total_amount: 500000     # al menos $500k en contratos (filtra ruido — $100k irrelevante en large caps)
  gov_contract_min_count: 0                 # 0 = disabled (amount threshold is sufficient)
  patent_momentum_min: 0                    # 0 = disabled (patent data sparse)
  sec13f_count_min: 0                       # 0 = disabled (13F filings are quarterly, not weekly)
  sec13f_change_min_pct: 0                  # 0 = disabled
  house_purchase_min_count: 0               # 0 = disabled (congressional buys as alternative gate)
  # How many distinct signal types must be non-zero (2 = exige corroboración entre fuentes)
  min_active_signal_types: 2

risk:
  daily_max_spend_usd: 0                 # 0 = disabled; daily_max_spend_pct_buying_power is the real limiter
  daily_max_spend_pct_buying_power: 1.0  # paper: allow up to 100% of buying power per day
  daily_max_new_positions: 0             # 0 = no count limit; cash budget above is the real limiter
  max_total_open_positions: 0           # 0 = no limit; daily_max_spend_pct_buying_power controls budget
  max_position_size_usd: 0              # 0 = disabled; max_symbol_exposure_pct_equity caps per-position
  min_position_size_usd: 100
  max_exposure_pct_equity: 0            # 0 = disabled; no cap on total equity deployed (paper)
  max_symbol_exposure_pct_equity: 0.12  # ~12% of equity per position (scales with account)
  cash_buffer_pct: 0.0                  # paper: no cash buffer reserved
  symbol_cooldown_days: 5
  if_position_open_skip: true
  skip_if_order_pending: true
  slippage_buffer_pct: 0.002
  max_symbol_risk_pct: 0.01
  atr_k: 1.5              # tightened from 2.0: stop at 1.5×ATR limits max loss per trade
  min_stop_pct: 0.03      # tightened from 0.05: 3% floor (was 5%) to match tighter ATR stops
  min_tick_equity_ge_1: 0.01
  min_tick_equity_lt_1: 0.0001
  stop_limit_buffer_pct: 0.002
  blown_stop_gap_atr_multiplier: 0.0  # market-sell on any gap (0 = immediate, no tolerance)

execution:
  use_bracket: true
  take_profit_atr_mult: 2.5          # tightened from 3.0: TP closer to price → more fills before reversal
  trailing_stop_atr_mult: 1.5        # tightened from 2.0: trail 1.5×ATR below price
  trailing_tighten_at_R: 0.2         # tightened from 0.3: start tighter trail sooner (at 0.2R gain)
  trailing_stop_profit_atr_mult: 1.0 # tightened from 1.5: 1×ATR once in profit (locks gains fast)
  protect_min_improvement_pct: 0.005 # 0.5% mínimo para actualizar stop (reduce spam)
  protect_min_improvement_usd: 0.10  # $0.10 mínimo absoluto para actualizar stop
  min_profit_lock_pct: 0.3           # tightened from 0.5: lock break-even at 0.3% gain (was 0.5%)
  time_in_force: day
  allow_partial_fills: true
  min_rr_ratio: 1.2

safeguards:
  enabled: true
  ttl_days: 90                               # extended: expires ~2026-06-17
  started_at_utc: "2026-03-19T00:00:00Z"
  break_even_R: 0.2                          # tightened from 0.3: move to break-even at 0.2R gain
  break_even_buffer_pct: 0.002              # increased from 0.001: entry + 0.2% buffer (vs 0.1%)
  trailing_enable: true

cache:
  quiver_heavy_ttl_sec: 14400   # 4h: refresca datos Quiver ~2x por sesión de mercado
  symbol_ttl_sec: 600

universe:
  mapping_failure_pct_block: 0.6

live_account:
  # Real-money Alpaca account (APCA_API_KEY_ID_REAL / APCA_API_SECRET_KEY_REAL).
  # Activated only when ENABLE_LIVE_TRADING=true is set in the environment.
  # Paper trading runs unchanged regardless of this section.
  #
  # Position sizing per order:  min(max_cash_pct × cash, max_position_size_usd)
  # Daily budget across orders:  daily_max_cash_pct × cash  (0 = unlimited)
  # Hard count limit per day:    daily_max_new_positions     (0 = no count limit)
  max_cash_pct: 0.20         # max fraction of live cash per individual position (10 %)
  max_position_size_usd: 500   # hard cap per position — raised for ~$3,800 account (10% ≈ $380)
  min_position_size_usd: 0.1    # minimum viable position
  daily_max_cash_pct: 0.50    # max fraction of live cash across all positions today (50 %)
  daily_max_new_positions: 0   # max new live trades per day (0 = no count limit)
  max_total_open_positions: 0  # 0 = no limit; daily_max_cash_pct controls budget
  symbol_cooldown_days: 5      # days before re-trading the same symbol
