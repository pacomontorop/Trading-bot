signals:
  freshness_days_quiver: 7
  freshness_days_yahoo_prices: 2
  max_symbols_per_scan: 200          # symbols evaluated per 60-s cycle
  symbol_rescan_cooldown_hours: 4    # hours before a symbol can be re-evaluated (0 = no cooldown)
                                     # 4h → ~2-3 full sweeps/day; catches afternoon filings & contracts
  approval_threshold: 9.8     # min total score to approve
                              # 9.8 → high-conviction only; buffer keeps LMT (10.19) safe on weak-momentum days
                              # test 2026-03-07 (threshold 10): 4/14 approved — RTX 17.4, WRB 14.9, THRY 13.9, LMT 10.2
                              # in bull market expect 3-6/day; in correction (Mar-2026) 2-4/day
  min_quiver_score: 3.0       # secondary gate: requires meaningful Quiver signal (not just Yahoo bonus)
                              # 3.0 = ~1 insider buy ($2.0) + small gov contract, OR $1.5M gov contracts alone
                              # prevents pure-Yahoo approvals (CAKE 0.0, NRP 0.0, HOFT 0.0) if threshold ever lowered

market:
  global_kill_switch: false
  # Pause new entries when CBOE VIX exceeds this level.
  # 0 = disabled.  Levels: calm <20, elevated 20-28, fear >28, crisis >35.
  # Existing positions continue to be monitored regardless.
  vix_pause_threshold: 28

yahoo_gate:
  min_avg_volume_7d: 250000
  min_market_cap: 1000000000
  max_atr_pct: 6.0
  require_trend_positive: true   # long-only: only buy stocks in uptrend vs 90d start
  min_price: 5.0
  max_price: 1000.0
  relaxed_min_market_cap: 300000000
  relaxed_min_avg_volume_7d: 50000
  relaxed_max_atr_pct: 12.0

technicals:
  # RSI gate applied after yahoo data fetch (uses already-fetched 90d history, no extra API call)
  # long-only sweet spot: avoid deeply oversold downtrends and overbought tops
  rsi_period: 14
  min_rsi: 40     # below 40 = likely in downtrend, avoid
  max_rsi: 75     # above 75 = overbought, high reversal risk
  require_rsi: false   # if true, reject symbols where RSI cannot be computed

quiver_gate:
  enabled: true
  fast_lane_enabled: true
  # Fast lane: strong single signal bypasses yahoo strict thresholds
  insider_buy_strong_min_count_7d: 2        # >= 2 insider buys in 7d = strong
  gov_contract_strong_min_total_30d: 1000000  # >= $1M gov contracts in 30d = strong
  patent_momentum_min_strong: 1.0           # >= 1.0 patent momentum score = strong (scale 0-5)
  # Minimum gate: at least ONE of these must be met for a symbol to pass
  # Set all to 0 to disable the gate entirely (quiver becomes scoring-only)
  insider_buy_min_count_lookback: 1         # at least 1 insider buy in freshness window
  gov_contract_min_total_amount: 100000     # at least $100k in gov contracts
  gov_contract_min_count: 0                 # 0 = disabled (amount threshold is sufficient)
  patent_momentum_min: 0                    # 0 = disabled (patent data sparse)
  sec13f_count_min: 0                       # 0 = disabled (13F filings are quarterly, not weekly)
  sec13f_change_min_pct: 0                  # 0 = disabled
  house_purchase_min_count: 0               # 0 = disabled (congressional buys as alternative gate)
  # How many distinct signal types must be non-zero (1 = any single signal is enough)
  min_active_signal_types: 1

risk:
  daily_max_spend_usd: 800
  daily_max_new_positions: 3
  max_total_open_positions: 10
  max_position_size_usd: 500
  min_position_size_usd: 100
  max_exposure_pct_equity: 0.60
  max_symbol_exposure_pct_equity: 0.12
  cash_buffer_pct: 0.10
  symbol_cooldown_days: 5
  if_position_open_skip: true
  skip_if_order_pending: true
  slippage_buffer_pct: 0.002
  max_symbol_risk_pct: 0.01
  atr_k: 2.0
  min_stop_pct: 0.05
  min_tick_equity_ge_1: 0.01
  min_tick_equity_lt_1: 0.0001
  stop_limit_buffer_pct: 0.002

execution:
  use_bracket: true
  take_profit_atr_mult: 3.0
  trailing_stop_atr_mult: 2.0
  time_in_force: day
  allow_partial_fills: true
  min_rr_ratio: 1.2

safeguards:
  enabled: true
  ttl_days: 30
  started_at_utc: "2026-03-04T00:00:00Z"
  break_even_R: 1.0
  break_even_buffer_pct: 0.001
  trailing_enable: true

cache:
  quiver_heavy_ttl_sec: 14400   # 4h: refresca datos Quiver ~2x por sesión de mercado
  symbol_ttl_sec: 600

universe:
  mapping_failure_pct_block: 0.6

live_account:
  # Real-money Alpaca account (APCA_API_KEY_ID_REAL / APCA_API_SECRET_KEY_REAL).
  # Activated only when ENABLE_LIVE_TRADING=true is set in the environment.
  # Paper trading runs unchanged regardless of this section.
  #
  # Position sizing per order:  min(max_cash_pct × cash, max_position_size_usd)
  # Daily budget across orders:  daily_max_cash_pct × cash  (0 = unlimited)
  # Hard count limit per day:    daily_max_new_positions     (0 = no count limit)
  max_cash_pct: 0.10           # max fraction of live cash per individual position (10 %)
  max_position_size_usd: 200   # hard cap per position (real money — keep conservative)
  min_position_size_usd: 25    # minimum viable position
  daily_max_cash_pct: 0.30     # max fraction of live cash across all positions today (30 %)
  daily_max_new_positions: 0   # max new live trades per day (0 = no count limit)
  max_total_open_positions: 10 # max simultaneous live positions
  symbol_cooldown_days: 5      # days before re-trading the same symbol
